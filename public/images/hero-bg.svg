<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="50%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Base -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Grid Pattern -->
  <rect width="1920" height="1080" fill="url(#grid)"/>
  
  <!-- Glow Effects -->
  <ellipse cx="1536" cy="216" rx="400" ry="300" fill="url(#glow1)"/>
  <ellipse cx="384" cy="864" rx="300" ry="250" fill="url(#glow2)"/>
  
  <!-- Abstract Electrical Pattern -->
  <g opacity="0.1" stroke="#64748b" stroke-width="2" fill="none">
    <!-- Switch outline -->
    <rect x="200" y="300" width="120" height="180" rx="8"/>
    <circle cx="260" cy="360" r="25"/>
    
    <!-- Socket outline -->
    <rect x="400" y="250" width="100" height="140" rx="8"/>
    <circle cx="430" cy="290" r="8"/>
    <circle cx="470" cy="290" r="8"/>
    <circle cx="450" cy="320" r="6"/>
    
    <!-- Decorative Lines -->
    <path d="M 1600 200 L 1700 200 L 1700 350 L 1800 350"/>
    <path d="M 150 700 L 250 700 L 250 850 L 350 850"/>
    <circle cx="1600" cy="200" r="5" fill="#dc2626"/>
    <circle cx="1800" cy="350" r="5" fill="#dc2626"/>
    <circle cx="150" cy="700" r="5" fill="#ea580c"/>
    <circle cx="350" cy="850" r="5" fill="#ea580c"/>
  </g>
  
  <!-- Floating Elements -->
  <g opacity="0.05">
    <circle cx="1400" cy="600" r="100"/>
    <circle cx="300" cy="400" r="80"/>
    <circle cx="1600" cy="800" r="120"/>
  </g>
  
  <!-- Text Watermark -->
  <text x="960" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" fill="#334155" opacity="0.03" font-weight="bold">MAKEL</text>
  
  <!-- Bottom Gradient Fade -->
  <rect x="0" y="800" width="1920" height="280" fill="url(#fadeGrad)" opacity="0.5"/>
  <defs>
    <linearGradient id="fadeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1"/>
    </linearGradient>
  </defs>
</svg>
