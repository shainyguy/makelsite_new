<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <linearGradient id="switchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="transparent"/>
  
  <!-- Frame 1 -->
  <rect x="50" y="80" width="120" height="180" rx="12" fill="url(#frameGrad)" filter="url(#shadow)"/>
  <!-- Switch 1 -->
  <rect x="70" y="100" width="80" height="60" rx="4" fill="url(#switchGrad)" stroke="#cbd5e1" stroke-width="1"/>
  <circle cx="110" cy="130" r="15" fill="#dc2626"/>
  <!-- Socket 1 -->
  <rect x="70" y="180" width="80" height="60" rx="4" fill="url(#switchGrad)" stroke="#cbd5e1" stroke-width="1"/>
  <circle cx="100" cy="210" r="8" fill="#475569"/>
  <circle cx="120" cy="210" r="8" fill="#475569"/>
  <circle cx="110" cy="225" r="6" fill="#475569"/>
  
  <!-- Frame 2 -->
  <rect x="230" y="80" width="120" height="180" rx="12" fill="url(#frameGrad)" filter="url(#shadow)"/>
  <!-- Switch 2 -->
  <rect x="250" y="100" width="80" height="60" rx="4" fill="url(#switchGrad)" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="270" y="115" width="40" height="30" rx="2" fill="#dc2626"/>
  <!-- Socket 2 -->
  <rect x="250" y="180" width="80" height="60" rx="4" fill="url(#switchGrad)" stroke="#cbd5e1" stroke-width="1"/>
  <circle cx="280" cy="210" r="8" fill="#475569"/>
  <circle cx="300" cy="210" r="8" fill="#475569"/>
  <circle cx="290" cy="225" r="6" fill="#475569"/>
  
  <!-- Brand Text -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#dc2626">MAKEL</text>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Электроустановочные изделия</text>
  
  <!-- Decor -->
  <circle cx="200" cy="40" r="20" fill="#fecaca" opacity="0.5"/>
  <circle cx="350" cy="300" r="30" fill="#fecaca" opacity="0.3"/>
  <circle cx="50" cy="350" r="25" fill="#fecaca" opacity="0.4"/>
</svg>
